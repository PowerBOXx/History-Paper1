<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB History Paper 1 - Interactive Practice</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f4f7f6;
            --border: #ddd;
        }

        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- Sidebar --- */
        #sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        #sidebar h2 { padding: 20px; margin: 0; font-size: 1.2rem; border-bottom: 1px solid #34495e; }
        #file-controls { padding: 15px; border-bottom: 1px solid #34495e; background: #233140; }
        #file-controls label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #bdc3c7; }
        #exam-list { overflow-y: auto; flex: 1; }
        .exam-btn { display: block; width: 100%; padding: 15px 20px; background: none; border: none; color: #bdc3c7; text-align: left; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        .exam-btn:hover { background: #34495e; color: white; }
        .exam-btn.active { background: #34495e; color: white; border-left-color: var(--secondary); }
        
        /* --- Main Area --- */
        #main { flex: 1; display: flex; flex-direction: column; }
        #header { background: white; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #exam-info h1 { margin: 0; font-size: 1.4rem; color: var(--primary); }
        #exam-info p { margin: 5px 0 0; color: #7f8c8d; font-size: 0.9rem; }
        
        #workspace { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; overflow-y: auto; padding: 30px; box-sizing: border-box; }
        #source-panel { background: white; border-right: 1px solid var(--border); max-width: 55%; }
        #qa-panel { background: #fafafa; }

        /* Source Content */
        .source-box { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .source-title { font-weight: bold; color: var(--primary); margin-bottom: 10px; display: block; }
        .source-text { font-family: "Georgia", serif; line-height: 1.6; font-size: 1.05rem; white-space: pre-wrap; }
        .source-img { max-width: 100%; border: 1px solid #ccc; display: block; margin-top: 10px; }
        .img-caption { font-size: 0.9rem; color: #666; font-style: italic; margin-top: 5px; }

        /* Questions */
        .question-card { 
            background: white; border: 1px solid var(--border); padding: 20px; border-radius: 8px; 
            margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        .q-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        .marks { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; color: #555; }
        .question-text { margin-top: 0; }

        /* Answer Area Styles */
        textarea { 
            width: 100%; 
            min-height: 80px; /* 最小高度 */
            height: auto;
            padding: 15px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            resize: none; /* 禁用用户拖拽 */
            box-sizing: border-box; 
            font-family: sans-serif;
            font-size: 1.1rem; /* 字体加大 */
            line-height: 1.5;
            overflow-y: hidden; /* 隐藏滚动条 */
        }
        textarea:focus { outline: none; border-color: var(--secondary); }

        /* Utility Buttons */
        .btn-primary { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-primary:hover { background: #2980b9; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 0.8rem; width: 100%; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        .btn-link { background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 0.9rem; margin-top: 5px; padding: 0; display: inline-block; }
        .btn-link:hover { text-decoration: underline; }
        
        /* Word Count */
        .word-count { font-size: 0.8rem; color: #7f8c8d; text-align: right; margin-top: 5px; }

        /* Model Answer Area */
        .model-answer { 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            margin-top: 15px; 
            background: #ecf0f1; 
            padding: 15px; 
            border-radius: 4px;
        }
        .model-answer h4 { margin-top: 0; color: var(--primary); font-size: 1rem; }
        .model-answer p { margin: 5px 0; font-size: 0.95rem; line-height: 1.5; color: #34495e; white-space: pre-wrap; }
        .hidden { display: none; }

        /* Loading Overlay - Now just a loading message */
        #loading-overlay { 
            position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(255,255,255,0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <h2>Loading Exam Data...</h2>
    <p>Attempting to load data.json from the same directory.</p>
</div>

<div id="sidebar">
    <h2>IB History Paper 1</h2>
    <div id="file-controls">
        <label>Data Management</label>
        <button class="btn-outline" onclick="saveProgress()">💾 Export My Answers</button>
        <button class="btn-outline" onclick="document.getElementById('import-answers').click()">📂 Load Answers</button>
        <input type="file" id="import-answers" accept=".json" style="display: none;">
    </div>
    <div id="exam-list">
        </div>
</div>

<div id="main">
    <div id="header">
        <div id="exam-info">
            <h1 id="exam-title">Loading...</h1>
            <p id="exam-theme">...</p>
        </div>
        <div id="timer" style="color:#e74c3c; font-weight:bold;"></div>
    </div>
    
    <div id="workspace">
        <div id="source-panel" class="panel">
            <h3>Sources</h3>
            <div id="source-content"></div>
        </div>
        <div id="qa-panel" class="panel">
            <h3>Questions and Your Answers</h3>
            <div id="questions-container"></div>
        </div>
    </div>
</div>

<script>
    let examData = [];
    let currentExamIndex = -1;
    let savedAnswers = {}; // { "examID-qID": "answer text" }

    // --- Answer Saving/Loading Utility ---
    const STORAGE_KEY = 'ib_history_answers';
    const overlay = document.getElementById('loading-overlay');

    function loadLocalAnswers() {
        const localSaved = localStorage.getItem(STORAGE_KEY);
        if(localSaved) {
            try {
                savedAnswers = JSON.parse(localSaved);
            } catch (e) {
                console.error("Could not parse saved answers from localStorage.", e);
                savedAnswers = {};
            }
        }
    }

    function saveLocalAnswers() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedAnswers));
    }

    function updateAnswer(key, value) {
        savedAnswers[key] = value;
        saveLocalAnswers(); // 自动保存到本地存储
        updateWordCount(key);
    }

    // --- Data Loading Logic (AUTOMATIC) ---
    async function loadDataAndInitUI() {
        try {
            // Attempt to fetch data.json from the same directory
            const response = await fetch('data.json'); 
            if (!response.ok) {
                throw new Error('Network response was not ok, or data.json file not found.');
            }
            examData = await response.json();

            // Structure check
            if (examData.length > 0 && examData[0].questions) {
                overlay.style.display = 'none';
                loadLocalAnswers(); // 加载本地已保存答案
                initUI();
            } else {
                overlay.innerHTML = '<h2>Data Load Error</h2><p>JSON structure is incorrect. Missing "questions" array in the data.</p>';
            }
        } catch (err) {
            console.error(err);
            overlay.innerHTML = `<h2>Data Load Error</h2><p>Could not load <code>data.json</code> automatically. Please ensure the file is in the same folder as <code>index.html</code>. Error: ${err.message}</p>`;
        }
    }

    // Call the automatic loading function when the script runs
    window.onload = loadDataAndInitUI;

    // --- Auto Textarea Height & Word Count Logic ---
    function autoGrow(element) {
        element.style.height = "auto";
        // Calculate and set the new height, adding a small buffer
        element.style.height = (element.scrollHeight) + "px"; 
    }

    function getWordCount(text) {
        if (!text) return 0;
        // 使用正则表达式匹配单词 (非空白字符序列)
        const matches = text.trim().match(/\S+/g);
        return matches ? matches.length : 0;
    }

    function updateWordCount(key) {
        const textarea = document.getElementById(`textarea-${key}`);
        if (!textarea) return;
        const count = getWordCount(textarea.value);
        document.getElementById(`word-count-${key}`).innerText = `${count} words`;
    }

    // --- UI Initialization ---
    function initUI() {
        const list = document.getElementById('exam-list');
        list.innerHTML = '';
        examData.forEach((exam, idx) => {
            const btn = document.createElement('button');
            btn.className = 'exam-btn';
            btn.innerText = exam.title;
            btn.onclick = () => loadExam(idx);
            list.appendChild(btn);
        });

        if (examData.length > 0) {
            loadExam(0); // 默认加载第一个考试
        } else {
            document.getElementById('exam-title').innerText = 'No Exams Found';
            document.getElementById('exam-theme').innerText = 'Please check your data.json file.';
        }
    }

    // --- Load Exam Content ---
    function loadExam(index) {
        currentExamIndex = index;
        const exam = examData[index];
        
        // Update Sidebar Active State
        document.querySelectorAll('.exam-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
        });

        document.getElementById('exam-title').innerText = exam.title;
        document.getElementById('exam-theme').innerText = exam.theme;

        // Render Sources
        const sPanel = document.getElementById('source-content');
        sPanel.innerHTML = '';
        exam.sources.forEach(src => {
            const div = document.createElement('div');
            div.className = 'source-box';
            
            let html = `<span class="source-title">Source ${src.id}</span>`;
            if(src.type === 'text') {
                html += `<div class="source-text" id="src-${exam.id}-${src.id}">${src.content}</div>`;
            } else if (src.type === 'image') {
                // Simplified image path handling for placeholder sources
                const imgSrc = src.src || 'placeholder-image.png'; 
                html += `<img src="${imgSrc}" class="source-img" onerror="this.style.display='none';this.insertAdjacentHTML('afterend', '<p style=color:red>Image not found or path incorrect: ${imgSrc}</p>')">`;
                if(src.caption) html += `<div class="img-caption">Caption: ${src.caption}</div>`;
            }
            div.innerHTML = html;
            sPanel.appendChild(div);
        });

        // Render Questions
        const qContainer = document.getElementById('questions-container');
        qContainer.innerHTML = '';
        exam.questions.forEach(q => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const key = `${exam.id}-${q.id}`;
            const val = savedAnswers[key] || "";
            
            // Model answer content is now pulled directly from the 'modelAnswer' field in the loaded JSON
            const modelAnswerText = q.modelAnswer || "Official answer will be loaded here when available.";

            card.innerHTML = `
                <div class="q-header">
                    <span>Question ${q.id}</span>
                    <span class="marks">[${q.marks} marks]</span>
                </div>
                <p class="question-text">${q.text}</p>
                
                <textarea 
                    id="textarea-${key}"
                    placeholder="Type answer here..." 
                    oninput="updateAnswer('${key}', this.value); autoGrow(this);"
                >${val}</textarea>
                
                <div class="word-count" id="word-count-${key}">0 words</div>

                <div>
                    <button class="btn-link" onclick="toggleModelAnswer(this, '${key}')">
                        View Model Answer / Markscheme
                    </button>
                </div>
                
                <div class="model-answer hidden" id="model-answer-${key}">
                    <h4>Official Answer / Guidance:</h4>
                    <p>${modelAnswerText}</p>
                </div>
            `;
            qContainer.appendChild(card);
        });
        
        // After rendering, initialize autoGrow and word counts for all textareas
        document.querySelectorAll('textarea').forEach(textarea => {
            autoGrow(textarea);
            const key = textarea.id.replace('textarea-', '');
            updateWordCount(key);
        });
    }

    // --- Model Answer Toggling ---
    function toggleModelAnswer(button, key) {
        const answerDiv = document.getElementById(`model-answer-${key}`);
        const isHidden = answerDiv.classList.toggle('hidden');
        button.innerText = isHidden ? 'View Model Answer / Markscheme' : 'Hide Model Answer / Markscheme';
    }

    // --- Export/Import Answers ---
    function saveProgress() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedAnswers, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "my_ib_history_answers.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
        alert("Your answers have been exported to my_ib_history_answers.json!");
    }

    document.getElementById('import-answers').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const loaded = JSON.parse(ev.target.result);
                // 使用...展开运算符合并新旧答案，保留本地未被导入文件覆盖的答案
                savedAnswers = { ...savedAnswers, ...loaded }; 
                saveLocalAnswers();
                if (currentExamIndex !== -1) {
                    loadExam(currentExamIndex); // Refresh UI to show loaded answers
                }
                alert("Answers loaded successfully! Your current exam view has been updated.");
            } catch(err) {
                alert("Invalid answer file. Please ensure it is a valid JSON file.");
            }
        };
        reader.readAsText(file);
    });

</script>
</body>
</html>
